<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pivní Deník 1.0</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --beer: #f39c12; --dark: #2c3e50; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); color: var(--dark); margin: 0; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        #reader { width: 100% !important; border-radius: 15px; overflow: hidden; background: #000; }
        input { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn { display: block; width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-bottom: 10px; }
        .btn-save { background: var(--beer); color: white; }
        .btn-cancel { background: #eee; color: #666; }
        .history-item { padding: 10px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .badge { background: #e74c3c; color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div style="max-width: 500px; margin: 0 auto;">
        <h1 style="text-align: center;">🍺 Pivní Deník</h1>

        <div id="reader-container" class="card">
            <div id="reader"></div>
            <p id="status-msg" style="text-align:center; color: #7f8c8d; font-size: 0.9rem;">Namiřte na čárový kód piva</p>
        </div>

        <div id="pivo-form" class="card" style="display:none;">
            <h3 id="form-title">Nové pivo nalezeno!</h3>
            <label>Pivovar:</label>
            <input type="text" id="p-pivovar" placeholder="Např. Zubr">
            <label>Název piva:</label>
            <input type="text" id="p-nazev" placeholder="Např. Gradus 12°">
            <label>Obsah alkoholu (%):</label>
            <input type="text" id="p-alko" placeholder="Např. 5.2">
            
            <button class="btn btn-save" onclick="ulozitPivo()">Uložit do deníku ✅</button>
            <button class="btn btn-cancel" onclick="resetScanner()">Zrušit</button>
        </div>

        <h3>Moje vypitá piva</h3>
        <div id="seznam" class="card">
            <p style="color: #999;">Zatím jste nic nevypili.</p>
        </div>
        <button onclick="smazatVse()" style="background:none; border:none; color: #e74c3c; font-size: 0.8rem; width: 100%; text-decoration: underline;">Smazat celou historii</button>
    </div>

<script>
    const html5QrCode = new Html5Qrcode("reader");
    let aktualniEAN = "";

    // Spuštění skeneru
    function start() {
        html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, onScanSuccess);
    }

    function onScanSuccess(decodedText) {
        aktualniEAN = decodedText;
        html5QrCode.stop();
        document.getElementById('reader-container').style.display = 'none';
        document.getElementById('pivo-form').style.display = 'block';

        // 1. Koukneme do naší vlastní paměti
        let mojePiva = JSON.parse(localStorage.getItem('pivni_mozek') || '{}');
        
        if (mojePiva[decodedText]) {
            fillForm(mojePiva[decodedText].pivovar, mojePiva[decodedText].nazev, mojePiva[decodedText].alko);
            document.getElementById('form-title').innerText = "Na zdraví! Je to:";
        } else {
            // 2. Jinak zkusíme internet
            document.getElementById('form-title').innerText = "Hledám v databázi...";
            fetch(`https://world.openfoodfacts.org/api/v0/product/${decodedText}.json`)
                .then(res => res.json())
                .then(data => {
                    if (data.status === 1 && data.product.categories?.toLowerCase().includes('beer')) {
                        // Je to pivo!
                        fillForm(data.product.brands, data.product.product_name, data.product.nutriments?.alcohol);
                        document.getElementById('form-title').innerText = "Našel jsem pivo!";
                    } else {
                        // Není to v databázi nebo to není pivo
                        fillForm("", "", "");
                        document.getElementById('form-title').innerText = "Neznámé pivo. Zadejte údaje:";
                    }
                })
                .catch(() => {
                    document.getElementById('form-title').innerText = "Offline. Zadejte ručně:";
                });
        }
    }

    function fillForm(pivovar, nazev, alko) {
        document.getElementById('p-pivovar').value = pivovar || "";
        document.getElementById('p-nazev').value = nazev || "";
        document.getElementById('p-alko').value = alko || "";
    }

    function ulozitPivo() {
        const pivo = {
            pivovar: document.getElementById('p-pivovar').value,
            nazev: document.getElementById('p-nazev').value,
            alko: document.getElementById('p-alko').value,
            cas: new Date().toLocaleString('cs-CZ', { hour: '2-digit', minute: '2-digit' })
        };

        // Uložit do "mozku" (aby si pamatoval EAN příště)
        let mozek = JSON.parse(localStorage.getItem('pivni_mozek') || '{}');
        mozek[aktualniEAN] = pivo;
        localStorage.setItem('pivni_mozek', JSON.stringify(mozek));

        // Uložit do historie (seznam vypitých piv)
        let historie = JSON.parse(localStorage.getItem('pivni_historie') || '[]');
        historie.unshift(pivo);
        localStorage.setItem('pivni_historie', JSON.stringify(historie));

        renderHistory();
        resetScanner();
    }

    function renderHistory() {
        let historie = JSON.parse(localStorage.getItem('pivni_historie') || '[]');
        let html = historie.length ? "" : "<p>Zatím nic.</p>";
        historie.forEach(p => {
            html += `<div class="history-item">
                <div><strong>${p.pivovar}</strong> - ${p.nazev}</div>
                <div style="text-align:right"><span class="badge">${p.alko}%</span><br><small>${p.cas}</small></div>
            </div>`;
        });
        document.getElementById('seznam').innerHTML = html;
    }

    function resetScanner() {
        document.getElementById('pivo-form').style.display = 'none';
        document.getElementById('reader-container').style.display = 'block';
        start();
    }

    function smazatVse() { if(confirm("Smazat všechna vypitá piva?")) { localStorage.removeItem('pivni_historie'); renderHistory(); } }

    window.onload = () => { renderHistory(); start(); };
</script>
</body>
</html>
